experiment:
  name: cl_sota
  datasets:
    - PROTEINS
    - MUTAG
    - NCI1
  n_tasks: 5
  seed_split: 0
  seed_model: 42

training:
  epochs_per_task: 30
  batch_size: 32
  optimizer: adamw
  lr: 1.0e-2
  weight_decay: 1.0e-4

model:
  encoder: dual_geometric
  hidden_dim: 64
  num_layers: 2
  output_dim: 64

pjepa:
  B: 64
  beta_ib: 1.0e-2
  lambda_mdl: 1.0e-3
  gamma_forward: 1.0e-4
  ema_momentum: 0.99
  ewc_lambda: 100.0
  gem_capacity: 128
